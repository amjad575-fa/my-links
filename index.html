<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مواقعي المفضلة</title>
  <style>
    /* تعريف الخط المخصص الجديد بصيغة OTF */
    @font-face {
      font-family: 'MyCustomFont'; 
      src: url('myfont.OTF') format('opentype'); 
    }

    * { box-sizing: border-box; }
    
    html, body { 
      margin: 0; 
      padding: 0; 
      height: 100vh; 
      /* تطبيق الخط الجديد هنا ليعمل على كامل الموقع */
      font-family: 'MyCustomFont', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      direction: rtl; 
      display: flex; 
      flex-direction: column;
    }

    /* تنسيق الشريط العلوي العصري */
    .top-header {
      position: relative; 
      background: linear-gradient(90deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      color: #b59a57; 
      display: flex;
      align-items: center;
      justify-content: center; 
      padding: 20px 40px; 
      min-height: 100px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      z-index: 20; 
      border-bottom: 2px solid #b59a57; 
    }

    /* الحاوية التي تضم الشعارين معاً في اليسار */
    .logos-container {
      position: absolute; 
      left: 40px; 
      top: 50%;
      transform: translateY(-50%); 
      display: flex; 
      align-items: center;
      gap: 15px; 
    }

    .logo {
      height: 70px; 
      width: auto;
      filter: drop-shadow(0 0 5px rgba(181, 154, 87, 0.3));
    }

    .top-header h2 {
      margin: 0;
      font-size: 28px;
      font-weight: 800;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }

    .app {
      display: flex; 
      flex-direction: row;
      flex: 1; 
      background: #eef2f6;
      overflow: hidden; 
    }

    aside {
      background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
      color: #f9fafb;
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
      box-shadow: -4px 0 15px rgba(0,0,0,0.1); 
      z-index: 10;
      width: 260px; 
      flex-shrink: 0;
    }

    aside h1 {
      font-size: 22px;
      margin: 0 0 15px;
      color: #b59a57; 
      text-align: center;
      border-bottom: 1px solid rgba(181, 154, 87, 0.3); 
      padding-bottom: 15px;
    }

    .site-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05); 
      color: #e2e8f0;
      padding: 14px 16px;
      font-size: 16px;
      font-family: inherit; 
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      text-align: center;
      transition: all 0.3s ease; 
    }
    
    .site-btn:hover { 
      background: #b59a57; 
      color: #0f172a;
      transform: translateY(-3px);
    }
    
    .site-btn.active {
      background: #b59a57;
      color: #0f172a;
      border-color: #d4c491;
      box-shadow: 0 4px 15px rgba(181, 154, 87, 0.4);
    }

    main {
      padding: 20px;
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
    }

    .viewer-frame {
      flex: 1;
      border: 2px solid #e2e8f0;
      border-radius: 15px;
      background: #fff;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    iframe#viewer {
      flex: 1;
      width: 100%;
      border: 0;
    }

    /* 📱 ضبط شاشات الموبايل */
    @media (max-width: 768px) {
      .top-header {
        justify-content: space-between; 
        padding: 15px 20px;
        min-height: auto;
      }
      .logos-container {
        position: static; 
        transform: none;
        gap: 10px; 
      }
      .logo { 
        height: 40px; 
      }
      .top-header h2 { font-size: 18px; margin-left: 10px;}
      .app { flex-direction: column; }
      aside { width: 100%; flex-direction: row; overflow-x: auto; padding: 10px; }
      aside h1 { display: none; }
      .site-btn { flex: 0 0 auto; padding: 8px 15px; font-size: 13px; }
    }
  </style>
</head>
<body>
  
  <header class="top-header">
    <h2>وزارة الأوقاف - Syria HiTech</h2>
    
    <div class="logos-container">
      <img src="Asset 1@4x-8.png" alt="شعار وزارة الأوقاف" class="logo">
      <img src="images.png" alt="شعار سوريا هايتك" class="logo">
    </div>
  </header>

  <div class="app">
    <aside>
      <h1>مواقعي</h1>
      <button class="site-btn" data-url="https://riyadah.study/auth/sign-in"> معهد ريادة </button>
      <button class="site-btn" data-url="https://wahi-app.eqrra.com/admin/dashboard/attendance"> مقرأة وحي </button>
      <button class="site-btn" data-url="https://blog.riyadah.study"> مدونة ريادة </button>
    </aside>
    <main>
      <div class="viewer-frame">
        <iframe id="viewer" title="Embedded site viewer"></iframe>
      </div>
    </main>
  </div>
  
  <script>
    const buttons = document.querySelectorAll('.site-btn');
    const viewer = document.getElementById('viewer');

    function load(url, btn) {
      viewer.src = url;
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    buttons.forEach(btn => {
      btn.addEventListener('click', () => load(btn.dataset.url, btn));
    });

    if(buttons.length > 0) {
      load(buttons[0].dataset.url, buttons[0]);
    }
  </script>
</body>
</html>
