<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مواقعي المفضلة</title>
  <style>
    * { box-sizing: border-box; }
    
    /* إضافة اتجاه النص من اليمين لليسار وتحديد خط أنيق */
    html, body { 
      margin: 0; 
      padding: 0; 
      height: 100%; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      direction: rtl; 
    }

    .app {
      display: grid;
      /* إعطاء مساحة أكبر قليلاً لعارض المواقع */
      grid-template-columns: 1fr 4fr; 
      height: 100vh;
      background: #eef2f6;
    }

    aside {
      /* تدرج لوني عصري للقائمة الجانبية */
      background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
      color: #f9fafb;
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
      /* إضافة ظل لفصل القائمة عن العارض */
      box-shadow: -4px 0 15px rgba(0,0,0,0.1); 
      z-index: 10;
    }

    aside h1 {
      font-size: 22px;
      margin: 0 0 15px;
      letter-spacing: 0.5px;
      color: #38bdf8;
      text-align: center;
      /* خط فاصل تحت العنوان */
      border-bottom: 2px solid #334155;
      padding-bottom: 15px;
    }

    .site-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.1);
      /* شفافية خفيفة للزر */
      background: rgba(255,255,255,0.05); 
      color: #e2e8f0;
      padding: 14px 16px;
      font-size: 16px;
      /* هذا السطر يجعل الزر يأخذ نفس خط العنوان */
      font-family: inherit; 
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      text-align: center;
      /* نعومة في الحركة عند التفاعل */
      transition: all 0.3s ease; 
    }
    
    /* تأثير تمرير الماوس */
    .site-btn:hover { 
      background: #38bdf8; 
      color: #0f172a;
      transform: translateY(-3px);
      box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
    }
    
    .site-btn:active { transform: translateY(0); }
    
    /* تأثير الزر النشط */
    .site-btn.active {
      background: #0ea5e9;
      color: #fff;
      border-color: #7dd3fc;
      box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4);
    }

    main {
      padding: 20px;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .viewer-frame {
      flex: 1;
      border: none;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .viewer-bar {
      background: #f8fafc;
      padding: 12px 16px;
      font-size: 14px;
      color: #475569;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    /* ترتيب الأزرار الوهمية لتبدو مثل المتصفح */
    .viewer-bar .dots { display: flex; gap: 6px; flex-direction: row-reverse; } 
    .viewer-bar .dot { width: 12px; height: 12px; border-radius: 50%; }
    .viewer-bar .dot:nth-child(1) { background: #ef4444; }
    .viewer-bar .dot:nth-child(2) { background: #eab308; }
    .viewer-bar .dot:nth-child(3) { background: #22c55e; }
    
    .viewer-bar .url { font-family: ui-monospace, Menlo, monospace; color: #64748b; direction: ltr; }

    iframe#viewer {
      flex: 1;
      width: 100%;
      border: 0;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <h1>مواقعي</h1>
      
      <button class="site-btn" data-url="https://riyadah.study/auth/sign-in"> معهد ريادة </button>
      <button class="site-btn" data-url="https://wahi-app.eqrra.com/admin/dashboard/attendance"> مقرأة وحي </button>
      <button class="site-btn" data-url="https://blog.riyadah.study"> مدونة ريادة </button>
      
    </aside>
    <main>
      <div class="viewer-frame">
        <div class="viewer-bar">
          <span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>
          <span class="url" id="url-label"></span>
        </div>
        <iframe id="viewer" title="Embedded site viewer"></iframe>
      </div>
    </main>
  </div>
  
  <script>
    const buttons = document.querySelectorAll('.site-btn');
    const viewer = document.getElementById('viewer');
    const urlLabel = document.getElementById('url-label');

    function load(url, btn) {
      viewer.src = url;
      urlLabel.textContent = url;
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    buttons.forEach(btn => {
      btn.addEventListener('click', () => load(btn.dataset.url, btn));
    });

    if(buttons.length > 0) {
      load(buttons[0].dataset.url, buttons[0]);
    }
  </script>
</body>
</html>
